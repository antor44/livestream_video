<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Capture</title>
  <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>
  <div class="header">
    <img src="./icon128.png" alt="Extension icon" />
    <h1>Audio Transcription <span id="extensionVersion" style="font-size:11px;font-weight:500;color:#64748b;letter-spacing:0.02em;"></span></h1>
  </div>

  <div class="section">
    <div class="card">
      <div class="row" style="justify-content: space-between; align-items: center;">
        <label style="margin: 0; font-weight: 600;">Status</label>
        <span id="connectionStatus"
          style="font-size: 12px; font-weight: 700; color: #94a3b8; background: rgba(148,163,184,.12); padding: 4px 8px; border-radius: 999px;">
          Idle
        </span>
      </div>
    </div>
  </div>

  <div class="button-container">
    <button class="button" id="startCapture">Start Capture</button>
    <button class="button" id="stopCapture" disabled>Stop Capture</button>
  </div>

  <div class="section" id="tts-top-section">
    <div class="card">
      <div class="input-container">
        <label for="ttsSpeed">Speech (TTS) Speed</label>
        <div class="row">
          <input type="range" id="ttsSpeed" min="0.5" max="2.0" step="0.1" value="1.0">
          <span id="ttsSpeedValue">1.0x</span>
        </div>
        <div class="checkbox-container" style="margin-top: 5px;">
          <input type="checkbox" id="enableTtsCheckbox">
          <label for="enableTtsCheckbox">Enable Speech (TTS)</label>
        </div>
      </div>
    </div>
  </div>



  <div class="section">
    <div class="card">
      <div class="checkbox-container">
        <input type="checkbox" id="useStandaloneCheckbox">
        <label for="useStandaloneCheckbox">Show in Standalone Window</label>
      </div>
      <div class="checkbox-container">
        <input type="checkbox" id="useVadCheckbox" checked>
        <label for="useVadCheckbox">Voice Activity Detection</label>
      </div>
    </div>
  </div>

  <h2>WhisperLive Server</h2>
  <div class="section">
    <div class="card">
      <div class="input-container">
        <label for="ipAddress">Server Connection</label>
        <div class="row">
          <input type="text" id="ipAddress" value="localhost" placeholder="IP Address" autocomplete="off">
          <input type="number" id="port" value="9090" placeholder="Port" style="max-width: 80px;" autocomplete="off">
        </div>
      </div>
      <div class="row" style="justify-content: flex-end; margin-top: 8px;">
        <button id="defaultIpButton" class="small-button" type="button">Reset Default</button>
      </div>
    </div>
  </div>

      <div class="input-container">
        <label for="taskDropdown">Whisper Task</label>
        <select id="taskDropdown">
          <option value="transcribe" selected>Transcribe</option>
          <option value="translate">Translate (to English)</option>
        </select>
      </div>

      <div class="input-container">
        <label for="modelSizeDropdown">Model Size</label>
        <select id="modelSizeDropdown">
          <option value="base">Base</option>
          <option value="small" selected>Small</option>
          <option value="medium">Medium</option>
          <option value="large-v2">Large-v2</option>
          <option value="large-v3-turbo">Large-v3-turbo</option>
          <option value="large-v3">Large-v3</option>
        </select>
      </div>

      <div class="input-container">
        <label for="textFormattingDropdown">Text Formatting</label>
        <select id="textFormattingDropdown">
          <option value="none">Raw Segments</option>
          <option value="join">Joined Text</option>
          <option value="advanced" selected>Advanced Paragraphs</option>
        </select>
      </div>

      <div class="input-container">
        <label for="transcriptionProfileDropdown">Transcription Profile</label>
        <select id="transcriptionProfileDropdown">
          <option value="accurate">Accurate (more lag, conservative)</option>
          <option value="balanced" selected>Balanced (default)</option>
          <option value="lowlag">Low Lag (fast, less accurate)</option>
        </select>
      </div>

      <div class="checkbox-container" style="margin-top: 5px;">
        <input type="checkbox" id="hideLiveTextCheckbox">
        <label for="hideLiveTextCheckbox">Hide Live Text (show only stable text)</label>
      </div>
    </div>
  </div>

  <h2>AI Translation</h2>
  <div class="section">
    <div class="card">
      <div class="checkbox-container" style="margin-bottom: 12px;">
        <input type="checkbox" id="enableGeminiTranslationCheckbox">
        <label for="enableGeminiTranslationCheckbox">Enable Gemini Translation</label>
      </div>

      <div class="input-container" id="geminiApiKeyRow">
        <label for="geminiApiKey">Gemini API Key</label>
        <input type="text" id="geminiApiKey" placeholder="Paste Key Here" autocomplete="off">
      </div>

      <div class="input-container">
        <label for="geminiModelDropdown">Translation Engine / Model</label>
        <select id="geminiModelDropdown">
          <optgroup label="No API Key Required">
            <option value="google-translate">Google Translate (free, no key)</option>
          </optgroup>
          <optgroup label="Gemini Models (API Key required)">
            <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
            <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
            <option value="gemini-3.1-flash-lite-preview" selected>gemini-3.1-flash-lite-preview</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
